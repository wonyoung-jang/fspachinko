[project]
name = "mandala"
version = "0.0.1"
description = "Copy random files from directory A to directory B."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "ffmpeg-python>=0.2.0",
    "pydantic>=2.12.5",
    "pyside6>=6.10.1",
    "send2trash>=1.8.3",
]

[project.scripts]
mandala-gui = "mandala.gui.runner:main"

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "mandala"
module-root = ""

[tool.vulture]
paths = ["./mandala", "whitelist.py"]
ignore_decorators = ["@app.*"]
min_confidence = 40
verbose = false

[dependency-groups]
dev = [
    "line-profiler>=5.0.0",
]
