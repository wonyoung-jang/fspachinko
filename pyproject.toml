[project]
name = "mandala"
version = "0.0.1"
description = "Copy random files from directory A to directory B."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "cyclopts>=4.4.5",
    "ffmpeg-python>=0.2.0",
    "pydantic>=2.12.5",
    "pyinstaller>=6.18.0",
    "pyside6>=6.10.1",
]

[project.scripts]
mandala = "mandala._gui:main"
mandala-gui = "mandala._gui:main"
mandala-cli = "mandala._cli:main"

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "mandala"
module-root = ""

[tool.vulture]
paths = ["./mandala", "whitelist.py"]
ignore_decorators = ["@app.*"]
min_confidence = 40
verbose = false

[dependency-groups]
dev = [
    "line-profiler>=5.0.0",
]
