[project]
name = "file-roulette"
version = "0.0.1"
description = "Copy random files from directory A to directory B."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "cyclopts>=4.4.5",
    "ffmpeg-python>=0.2.0",
    "pydantic>=2.12.5",
    "pyinstaller>=6.18.0",
    "pyside6>=6.10.1",
    "qt-material>=2.17",
]

[project.scripts]
file-roulette = "file_roulette._gui:main"
file-roulette-gui = "file_roulette._gui:main"
file-roulette-cli = "file_roulette._cli:main"

[build-system]
requires = ["uv_build>=0.9.1,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "file_roulette"
module-root = ""

[tool.vulture]
paths = ["./file_roulette", "whitelist.py"]
ignore_decorators = ["@app.*"]
min_confidence = 40
verbose = false

[dependency-groups]
dev = [
    "line-profiler>=5.0.0",
    "tprof>=1.1.0",
]
docs = [
    "mkdocstrings-python>=2.0.1",
    "zensical>=0.0.19",
]
